<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线条地球 | Line Art Earth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --line-color: #1a1a1a;
            --line-subtle: rgba(26, 26, 26, 0.15);
            --bg-color: #f8f7f2;
            --accent: #e63946;
            --grid-color: rgba(0, 0, 0, 0.06);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Mono', 'Noto Sans SC', monospace;
            background: var(--bg-color);
            overflow: hidden;
            color: var(--line-color);
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .paper-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0.3;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        .ui-layer {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }
        
        .ui-interactive { pointer-events: auto; }
        
        .header {
            top: 2rem;
            left: 2rem;
        }
        
        .title {
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            font-weight: 400;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }
        
        .subtitle {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.15em;
        }
        
        .mode-indicator {
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 0;
            border: 1px solid var(--line-color);
        }
        
        .mode-btn {
            padding: 0.6rem 1.2rem;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--line-color);
            border-right: 1px solid var(--line-color);
        }
        
        .mode-btn:last-child { border-right: none; }
        .mode-btn:hover { background: rgba(26,26,26,0.05); }
        .mode-btn.active { background: var(--line-color); color: var(--bg-color); }
        
        .controls {
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: flex-end;
        }
        
        .control-group {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            width: 42px;
            height: 42px;
            border: 1px solid var(--line-color);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            font-size: 1.1rem;
            transition: all 0.2s;
            color: var(--line-color);
        }
        
        .btn:hover { background: var(--line-color); color: var(--bg-color); }
        .btn.active { background: var(--line-color); color: var(--bg-color); }
        
        .info {
            bottom: 2rem;
            left: 2rem;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            line-height: 1.8;
        }
        
        .coord {
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            margin-top: 0.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .corner {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid var(--line-subtle);
            z-index: 5;
            pointer-events: none;
        }
        
        .corner-tl { top: 1rem; left: 1rem; border-right: none; border-bottom: none; }
        .corner-tr { top: 1rem; right: 1rem; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 1rem; left: 1rem; border-right: none; border-top: none; }
        .corner-br { bottom: 1rem; right: 1rem; border-left: none; border-top: none; }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
            gap: 1rem;
        }
        
        .loading.hidden { opacity: 0; pointer-events: none; }
        
        .loading-text {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            opacity: 0.5;
        }
        
        .loading-bar {
            width: 120px;
            height: 1px;
            background: var(--line-subtle);
            position: relative;
            overflow: hidden;
        }
        
        .loading-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--line-color);
            width: 0%;
            transition: width 0.3s;
        }
        
        .scale-indicator {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            height: 100px;
            width: 1px;
            background: var(--line-subtle);
            z-index: 5;
        }
        
        .scale-indicator::before,
        .scale-indicator::after {
            content: '';
            position: absolute;
            left: -3px;
            width: 7px;
            height: 1px;
            background: var(--line-subtle);
        }
        
        .scale-indicator::before { top: 0; }
        .scale-indicator::after { bottom: 0; }
    </style>
</head>
<body>
    <div class="paper-texture"></div>
    
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    
    <div class="scale-indicator"></div>
    
    <div class="loading" id="loading">
        <div class="loading-text">LOADING BORDERS</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress"></div>
        </div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="ui-layer header">
        <div class="title">INTERACTIVE EARTH</div>
        <div class="subtitle">线条地球 · 国界版</div>
    </div>
    
    <div class="ui-layer mode-indicator ui-interactive">
        <button class="mode-btn active" data-mode="zen">ZEN</button>
        <button class="mode-btn" data-mode="atlas">ATLAS</button>
        <button class="mode-btn" data-mode="data">DATA</button>
    </div>
    
    <div class="ui-layer info">
        <div>LATITUDE / LONGITUDE</div>
        <div class="coord" id="coord">00.0000° N &nbsp;&nbsp; 00.0000° E</div>
        <div style="margin-top: 2rem; opacity: 0.4; font-size: 0.6rem;">
            DRAG TO ROTATE · SCROLL TO ZOOM · RIGHT CLICK TO PAN
        </div>
    </div>
    
    <div class="ui-layer controls ui-interactive">
        <div class="control-group">
            <button class="btn" id="btn-rotate" title="Toggle Rotation (R)">⟲</button>
            <button class="btn" id="btn-reset" title="Reset (0)">⌂</button>
        </div>
        <div class="control-group">
            <button class="btn" id="btn-zoom-out">−</button>
            <button class="btn" id="btn-zoom-in">+</button>
        </div>
    </div>

    <script>
        // ==========================================
        // LINE ART EARTH WITH PROPER BORDERS
        // ==========================================
        
        let scene, camera, renderer, controls;
        let earthGroup, bordersGroup, gridGroup, coastlinesGroup;
        let autoRotate = true;
        let currentMode = 'zen';
        let citiesGroup = null;
        let bordersLoaded = false;
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const RADIUS = 1;
        
        // GeoJSON cache
        let worldData = null;
        
        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8f7f2);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 3.5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 1.8;
            controls.maxDistance = 8;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;
            controls.enablePan = true;
            
            earthGroup = new THREE.Group();
            
            // Create base structure
            createBaseSphere();
            createGridLines();
            
            // Load borders
            await loadWorldData();
            
            // Create city markers
            createCityMarkers();
            
            scene.add(earthGroup);
            
            // Initialize in Zen mode
            switchMode('zen');
            
            window.addEventListener('resize', onResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('keydown', onKeyDown);
            
            document.getElementById('loading').classList.add('hidden');
            
            animate();
        }
        
        function createBaseSphere() {
            // Solid sphere to occlude back-facing lines
            const solidGeo = new THREE.SphereGeometry(RADIUS, 64, 64);
            const solidMat = new THREE.MeshBasicMaterial({
                color: 0xf8f7f2,  // Same as background color
                side: THREE.FrontSide
            });
            const solidSphere = new THREE.Mesh(solidGeo, solidMat);
            solidSphere.renderOrder = -1;  // Render first
            earthGroup.add(solidSphere);
            
            // Very subtle base sphere outline
            const geo = new THREE.IcosahedronGeometry(RADIUS, 3);
            const mat = new THREE.MeshBasicMaterial({
                color: 0xd0d0d0,
                wireframe: true
            });
            const sphere = new THREE.Mesh(geo, mat);
            earthGroup.add(sphere);
        }
        
        function createGridLines() {
            gridGroup = new THREE.Group();
            
            // Latitude lines (parallels) - key latitudes for Atlas mode
            // 0 = Equator, ±23.5 = Tropics, ±66.5 = Polar circles
            const latitudes = [0, 23.5, -23.5, 66.5, -66.5];
            latitudes.forEach((lat, index) => {
                const radius = Math.cos(Math.abs(lat) * Math.PI / 180) * RADIUS;
                const y = Math.sin(lat * Math.PI / 180) * RADIUS;
                
                const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, 2 * Math.PI, false, 0);
                const points = curve.getPoints(64);
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({
                    color: lat === 0 ? 0x666666 : 0xaaaaaa,
                    transparent: true,
                    opacity: 0.7
                });
                const line = new THREE.Line(geo, mat);
                line.rotation.x = Math.PI / 2;
                line.position.y = y;
                line.userData = { type: 'special', lat: lat };
                gridGroup.add(line);
            });
            
            // Additional latitude lines for Data mode
            const extraLatitudes = [-60, -30, 30, 60];
            extraLatitudes.forEach(lat => {
                const radius = Math.cos(Math.abs(lat) * Math.PI / 180) * RADIUS;
                const y = Math.sin(lat * Math.PI / 180) * RADIUS;
                
                const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, 2 * Math.PI, false, 0);
                const points = curve.getPoints(64);
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({
                    color: 0xcccccc,
                    transparent: true,
                    opacity: 0.5
                });
                const line = new THREE.Line(geo, mat);
                line.rotation.x = Math.PI / 2;
                line.position.y = y;
                line.userData = { type: 'extra' };
                gridGroup.add(line);
            });
            
            // Longitude lines (meridians) for Data mode
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI;
                const points = [];
                for (let j = 0; j <= 64; j++) {
                    const lat = (j / 64) * Math.PI - Math.PI / 2;
                    const x = RADIUS * Math.cos(lat) * Math.cos(angle);
                    const y = RADIUS * Math.sin(lat);
                    const z = RADIUS * Math.cos(lat) * Math.sin(angle);
                    points.push(new THREE.Vector3(x, y, z));
                }
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({
                    color: 0xcccccc,
                    transparent: true,
                    opacity: 0.4
                });
                const line = new THREE.Line(geo, mat);
                line.userData = { type: 'meridian' };
                gridGroup.add(line);
            }
            
            // Equator-only line for Zen mode (stored separately)
            const equatorRadius = RADIUS;
            const equatorCurve = new THREE.EllipseCurve(0, 0, equatorRadius, equatorRadius, 0, 2 * Math.PI, false, 0);
            const equatorPoints = equatorCurve.getPoints(64);
            const equatorGeo = new THREE.BufferGeometry().setFromPoints(equatorPoints);
            const equatorMat = new THREE.LineBasicMaterial({
                color: 0x888888,
                transparent: true,
                opacity: 0.6
            });
            const equatorLine = new THREE.Line(equatorGeo, equatorMat);
            equatorLine.rotation.x = Math.PI / 2;
            equatorLine.userData = { type: 'equator' };
            gridGroup.add(equatorLine);
            
            earthGroup.add(gridGroup);
        }
        
        async function loadWorldData() {
            try {
                // Load world borders GeoJSON
                const response = await fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson');
                worldData = await response.json();
                
                createBordersFromGeoJSON();
                bordersLoaded = true;
            } catch (e) {
                console.error('Failed to load borders:', e);
                createFallbackBorders();
            }
        }
        
        function createBordersFromGeoJSON() {
            bordersGroup = new THREE.Group();
            coastlinesGroup = new THREE.Group();
            
            let processedFeatures = 0;
            const totalFeatures = worldData.features.length;
            
            worldData.features.forEach((feature, index) => {
                const geometry = feature.geometry;
                if (!geometry) return;
                
                const countryGroup = new THREE.Group();
                
                if (geometry.type === 'Polygon') {
                    processPolygon(geometry.coordinates, countryGroup);
                } else if (geometry.type === 'MultiPolygon') {
                    geometry.coordinates.forEach(polygon => {
                        processPolygon(polygon, countryGroup);
                    });
                }
                
                bordersGroup.add(countryGroup);
                
                // Update loading progress
                processedFeatures++;
                if (index % 10 === 0) {
                    const progress = (processedFeatures / totalFeatures) * 100;
                    document.getElementById('loading-progress').style.width = progress + '%';
                }
            });
            
            earthGroup.add(bordersGroup);
            
            // Separate coastlines (outer rings only)
            extractCoastlines();
            earthGroup.add(coastlinesGroup);
        }
        
        function processPolygon(rings, group) {
            // rings[0] is the outer boundary, rings[1+] are holes
            rings.forEach((ring, ringIndex) => {
                const points = [];
                const isOuterRing = ringIndex === 0;
                
                ring.forEach(([lon, lat]) => {
                    const pos = latLonToVector3(lat, lon, RADIUS + 0.001);
                    points.push(pos);
                });
                
                if (points.length > 1) {
                    const geo = new THREE.BufferGeometry().setFromPoints(points);
                    const mat = new THREE.LineBasicMaterial({
                        color: isOuterRing ? 0x333333 : 0x999999
                    });
                    const line = new THREE.Line(geo, mat);
                    group.add(line);
                }
            });
        }
        
        function extractCoastlines() {
            // Create a cleaner coastline version for minimal mode
            worldData.features.forEach(feature => {
                const geometry = feature.geometry;
                if (!geometry) return;
                
                if (geometry.type === 'Polygon') {
                    extractCoastlineFromPolygon(geometry.coordinates);
                } else if (geometry.type === 'MultiPolygon') {
                    geometry.coordinates.forEach(polygon => {
                        extractCoastlineFromPolygon(polygon);
                    });
                }
            });
        }
        
        function extractCoastlineFromPolygon(rings) {
            // Only take outer ring for coastline
            const outerRing = rings[0];
            const points = [];
            
            outerRing.forEach(([lon, lat]) => {
                const pos = latLonToVector3(lat, lon, RADIUS + 0.001);
                points.push(pos);
            });
            
            if (points.length > 1) {
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({
                    color: 0x1a1a1a
                });
                const line = new THREE.Line(geo, mat);
                coastlinesGroup.add(line);
            }
        }
        
        function createCityMarkers() {
            citiesGroup = new THREE.Group();
            
            // Major world capitals and cities
            const cities = [
                { name: 'BEIJING', lat: 39.9042, lon: 116.4074, offset: { x: 12, y: -5 } },
                { name: 'TOKYO', lat: 35.6762, lon: 139.6503, offset: { x: 10, y: -5 } },
                { name: 'LONDON', lat: 51.5074, lon: -0.1278, offset: { x: -45, y: -5 } },
                { name: 'PARIS', lat: 48.8566, lon: 2.3522, offset: { x: 10, y: -5 } },
                { name: 'NEW_YORK', lat: 40.7128, lon: -74.0060, offset: { x: -60, y: -5 } },
                { name: 'MOSCOW', lat: 55.7558, lon: 37.6173, offset: { x: 12, y: -5 } },
                { name: 'SYDNEY', lat: -33.8688, lon: 151.2093, offset: { x: 12, y: -5 } },
                { name: 'CAIRO', lat: 30.0444, lon: 31.2357, offset: { x: 10, y: -5 } },
                { name: 'MUMBAI', lat: 19.0760, lon: 72.8777, offset: { x: 12, y: -5 } },
                { name: 'SAO_PAULO', lat: -23.5505, lon: -46.6333, offset: { x: -65, y: -5 } },
                { name: 'LOS_ANGELES', lat: 34.0522, lon: -118.2437, offset: { x: -85, y: -5 } },
                { name: 'SINGAPORE', lat: 1.3521, lon: 103.8198, offset: { x: 14, y: -5 } },
                { name: 'DUBAI', lat: 25.2048, lon: 55.2708, offset: { x: 10, y: -5 } },
                { name: 'BERLIN', lat: 52.5200, lon: 13.4050, offset: { x: 10, y: -5 } },
                { name: 'ROME', lat: 41.9028, lon: 12.4964, offset: { x: 8, y: -5 } },
                { name: 'MADRID', lat: 40.4168, lon: -3.7038, offset: { x: -50, y: -5 } },
                { name: 'SEOUL', lat: 37.5665, lon: 126.9780, offset: { x: 10, y: -5 } },
                { name: 'BANGKOK', lat: 13.7563, lon: 100.5018, offset: { x: 14, y: -5 } },
                { name: 'ISTANBUL', lat: 41.0082, lon: 28.9784, offset: { x: 14, y: -5 } },
                { name: 'TORONTO', lat: 43.6532, lon: -79.3832, offset: { x: -60, y: -5 } }
            ];
            
            cities.forEach((city, index) => {
                const pos = latLonToVector3(city.lat, city.lon, RADIUS);
                const posAbove = latLonToVector3(city.lat, city.lon, RADIUS + 0.008);
                
                // Create tiny dot marker using a small point
                const dotGeo = new THREE.BufferGeometry().setFromPoints([pos]);
                const dotMat = new THREE.PointsMaterial({ 
                    color: 0x1a1a1a,
                    size: 0.012,
                    sizeAttenuation: true
                });
                const dot = new THREE.Points(dotGeo, dotMat);
                dot.userData = { city: city.name };
                citiesGroup.add(dot);
                
                // Thin cross/plus marker using small lines
                const crossSize = 0.010;
                const crossGroup = new THREE.Group();
                
                // Horizontal line
                const hLineGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(pos.x - crossSize, pos.y, pos.z),
                    new THREE.Vector3(pos.x + crossSize, pos.y, pos.z)
                ]);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x1a1a1a, opacity: 0.8, transparent: true });
                const hLine = new THREE.Line(hLineGeo, lineMat);
                crossGroup.add(hLine);
                
                // Vertical line
                const vLineGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(pos.x, pos.y - crossSize, pos.z),
                    new THREE.Vector3(pos.x, pos.y + crossSize, pos.z)
                ]);
                const vLine = new THREE.Line(vLineGeo, lineMat);
                crossGroup.add(vLine);
                
                // Orient cross to face outward
                crossGroup.lookAt(pos.clone().multiplyScalar(2));
                citiesGroup.add(crossGroup);
                
                // Create floating text label using canvas texture
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const fontSize = 24;
                ctx.font = `${fontSize}px "Space Mono", monospace`;
                const textWidth = ctx.measureText(city.name).width;
                
                canvas.width = textWidth + 20;
                canvas.height = fontSize + 10;
                
                // Clear background (transparent)
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw text
                ctx.font = `${fontSize}px "Space Mono", monospace`;
                ctx.fillStyle = '#1a1a1a';
                ctx.textBaseline = 'middle';
                ctx.fillText(city.name, 10, canvas.height / 2);
                
                const texture = new THREE.CanvasTexture(canvas);
                texture.minFilter = THREE.LinearFilter;
                
                const spriteMat = new THREE.SpriteMaterial({ 
                    map: texture,
                    transparent: true,
                    opacity: 0.9
                });
                const sprite = new THREE.Sprite(spriteMat);
                
                // Position sprite slightly offset from the marker
                const labelPos = latLonToVector3(city.lat, city.lon, RADIUS + 0.025);
                sprite.position.copy(labelPos);
                
                // Scale sprite to maintain readable size
                const scaleFactor = 0.015;
                sprite.scale.set(
                    (canvas.width / canvas.height) * scaleFactor,
                    scaleFactor,
                    1
                );
                
                // Store offset for animation
                sprite.userData = { 
                    city: city.name,
                    basePos: labelPos.clone(),
                    offset: city.offset || { x: 0, y: 0 },
                    phase: index * 0.5, // Different phase for each city
                    originalWidth: canvas.width / canvas.height
                };
                
                citiesGroup.add(sprite);
            });
            
            citiesGroup.visible = false;
            earthGroup.add(citiesGroup);
        }
        
        function createFallbackBorders() {
            // Simplified major country borders as fallback
            bordersGroup = new THREE.Group();
            
            const majorCountries = [
                // USA
                [[-125, 49], [-125, 25], [-105, 25], [-100, 30], [-95, 30], [-80, 25], [-80, 40], [-70, 45], [-70, 47], [-125, 49]],
                // Canada
                [[-140, 60], [-140, 50], [-125, 49], [-95, 49], [-80, 45], [-60, 45], [-60, 55], [-80, 70], [-140, 70]],
                // Brazil
                [[-70, 5], [-50, 5], [-35, -5], [-35, -25], [-55, -35], [-75, -10], [-70, 5]],
                // China
                [[80, 50], [90, 45], [110, 40], [120, 35], [125, 40], [130, 45], [125, 55], [115, 50], [100, 45], [80, 50]],
                // Russia
                [[30, 70], [60, 70], [100, 70], [140, 65], [180, 65], [180, 55], [140, 50], [100, 55], [60, 50], [30, 55]],
                // Australia
                [[115, -15], [145, -15], [155, -25], [150, -40], [130, -40], [115, -30]],
                // India
                [[70, 25], [90, 25], [95, 20], [85, 10], [75, 10], [70, 25]],
                // Europe cluster (simplified)
                [[-10, 50], [10, 60], [30, 60], [40, 50], [30, 35], [10, 35], [-10, 45]],
                // Africa
                [[-10, 35], [10, 35], [30, 32], [40, 15], [50, 0], [40, -30], [20, -35], [10, -20], [0, -15], [-10, 5]],
            ];
            
            majorCountries.forEach(border => {
                const points = border.map(([lon, lat]) => latLonToVector3(lat, lon, RADIUS + 0.001));
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({
                    color: 0x1a1a1a
                });
                const line = new THREE.Line(geo, mat);
                bordersGroup.add(line);
            });
            
            earthGroup.add(bordersGroup);
            coastlinesGroup = bordersGroup;
        }
        
        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lon + 180) * Math.PI / 180;
            
            const x = -radius * Math.sin(phi) * Math.cos(theta);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            const y = radius * Math.cos(phi);
            
            return new THREE.Vector3(x, y, z);
        }
        
        // ==========================================
        // INTERACTION
        // ==========================================
        
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            updateCoordinates();
        }
        
        function updateCoordinates() {
            raycaster.setFromCamera(mouse, camera);
            
            const sphereGeo = new THREE.SphereGeometry(RADIUS, 32, 32);
            const sphereMat = new THREE.MeshBasicMaterial({ visible: false });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            
            const intersects = raycaster.intersectObject(sphere);
            
            if (intersects.length > 0) {
                const point = intersects[0].point;
                const lat = Math.asin(point.y / RADIUS) * 180 / Math.PI;
                const lon = Math.atan2(point.x, point.z) * 180 / Math.PI;
                
                const latStr = (lat >= 0 ? lat : -lat).toFixed(4) + '° ' + (lat >= 0 ? 'N' : 'S');
                const lonStr = (lon >= 0 ? lon : -lon).toFixed(4) + '° ' + (lon >= 0 ? 'E' : 'W');
                
                document.getElementById('coord').innerHTML = `${latStr} &nbsp;&nbsp; ${lonStr}`;
            }
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function onKeyDown(event) {
            switch(event.key.toLowerCase()) {
                case 'r': toggleRotation(); break;
                case '+': case '=': zoomIn(); break;
                case '-': case '_': zoomOut(); break;
                case '0': resetView(); break;
            }
        }
        
        // ==========================================
        // CONTROLS
        // ==========================================
        
        function toggleRotation() {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
            document.getElementById('btn-rotate').classList.toggle('active', autoRotate);
        }
        
        function zoomIn() {
            const target = Math.max(1.8, camera.position.length() - 0.5);
            animateZoom(target);
        }
        
        function zoomOut() {
            const target = Math.min(8, camera.position.length() + 0.5);
            animateZoom(target);
        }
        
        function animateZoom(target) {
            const start = camera.position.length();
            const startTime = Date.now();
            const duration = 300;
            
            function update() {
                const elapsed = Date.now() - startTime;
                const p = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                
                const dist = start + (target - start) * ease;
                camera.position.normalize().multiplyScalar(dist);
                
                if (p < 1) requestAnimationFrame(update);
            }
            update();
        }
        
        function resetView() {
            const start = camera.position.clone();
            const target = new THREE.Vector3(0, 0, 3.5);
            const startTime = Date.now();
            const duration = 600;
            
            function update() {
                const elapsed = Date.now() - startTime;
                const p = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                
                camera.position.lerpVectors(start, target, ease);
                controls.target.set(0, 0, 0);
                
                if (p < 1) requestAnimationFrame(update);
            }
            update();
        }
        
        // ==========================================
        // MODE SWITCHING
        // ==========================================
        
        function switchMode(mode) {
            currentMode = mode;
            
            switch(mode) {
                case 'zen':
                    // Ultra-minimal: only coastlines + equator
                    // Slower rotation for meditation
                    controls.autoRotateSpeed = 0.3;
                    
                    // Show only equator, hide all other grid lines
                    gridGroup.children.forEach(child => {
                        if (child.userData.type === 'equator') {
                            child.visible = true;
                            child.material.opacity = 0.4;
                            child.material.linewidth = 1;
                        } else {
                            child.visible = false;
                        }
                    });
                    gridGroup.visible = true;
                    
                    // Show only coastlines, no internal borders
                    if (bordersGroup) bordersGroup.visible = false;
                    if (coastlinesGroup) {
                        coastlinesGroup.visible = true;
                        // Ultra-thin lines for zen aesthetic
                        coastlinesGroup.traverse(child => {
                            if (child.isLine && child.material) {
                                child.material.opacity = 0.6;
                            }
                        });
                    }
                    if (citiesGroup) citiesGroup.visible = false;
                    break;
                    
                case 'atlas':
                    // Classic map style: coastlines + key borders + special latitudes
                    // Medium rotation speed
                    controls.autoRotateSpeed = 0.5;
                    
                    // Show special latitudes (equator, tropics, polar circles)
                    gridGroup.children.forEach(child => {
                        if (child.userData.type === 'special') {
                            child.visible = true;
                            child.material.opacity = 0.7;
                        } else if (child.userData.type === 'equator') {
                            child.visible = false; // Hide the duplicate equator
                        } else {
                            child.visible = false;
                        }
                    });
                    gridGroup.visible = true;
                    
                    // Show coastlines + subtle borders
                    if (coastlinesGroup) {
                        coastlinesGroup.visible = true;
                        coastlinesGroup.traverse(child => {
                            if (child.isLine && child.material) {
                                child.material.opacity = 1.0;
                            }
                        });
                    }
                    if (bordersGroup) {
                        bordersGroup.visible = true;
                        // Lighter borders for cleaner look
                        bordersGroup.traverse(child => {
                            if (child.isLine && child.material) {
                                const originalColor = child.material.color.getHex();
                                // Make borders subtle
                                if (originalColor === 0x333333) {
                                    child.material.color.setHex(0x666666);
                                    child.material.opacity = 0.6;
                                } else {
                                    child.material.color.setHex(0xaaaaaa);
                                    child.material.opacity = 0.4;
                                }
                            }
                        });
                    }
                    if (citiesGroup) citiesGroup.visible = false;
                    break;
                    
                case 'data':
                    // Full information: all borders + full grid + city markers
                    // Faster rotation for exploration feel
                    controls.autoRotateSpeed = 0.8;
                    
                    // Show all grid lines
                    gridGroup.children.forEach(child => {
                        child.visible = true;
                        child.material.opacity = 1.0;
                    });
                    gridGroup.visible = true;
                    
                    // Show everything with full opacity
                    if (coastlinesGroup) {
                        coastlinesGroup.visible = true;
                        coastlinesGroup.traverse(child => {
                            if (child.isLine && child.material) {
                                child.material.opacity = 1.0;
                            }
                        });
                    }
                    if (bordersGroup) {
                        bordersGroup.visible = true;
                        bordersGroup.traverse(child => {
                            if (child.isLine && child.material) {
                                child.material.color.setHex(0x1a1a1a);
                                child.material.opacity = 1.0;
                            }
                        });
                    }
                    if (citiesGroup) citiesGroup.visible = true;
                    break;
            }
        }
        
        // Event bindings
        document.getElementById('btn-rotate').addEventListener('click', toggleRotation);
        document.getElementById('btn-zoom-in').addEventListener('click', zoomIn);
        document.getElementById('btn-zoom-out').addEventListener('click', zoomOut);
        document.getElementById('btn-reset').addEventListener('click', resetView);
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                switchMode(this.dataset.mode);
            });
        });
        
        // ==========================================
        // ANIMATION
        // ==========================================
        
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            controls.update();
            
            // Calculate zoom factor based on camera distance
            // camera distance ranges from ~1.8 (close) to 8 (far)
            const camDist = camera.position.length();
            const zoomFactor = Math.max(0.3, Math.min(2.0, 3.5 / camDist));
            
            // Animate city labels floating effect and scale with zoom
            if (citiesGroup && citiesGroup.visible) {
                citiesGroup.children.forEach(child => {
                    if (child.isSprite && child.userData.basePos) {
                        const phase = child.userData.phase || 0;
                        const offset = child.userData.offset || { x: 0, y: 0 };
                        
                        // Subtle floating motion
                        const floatX = Math.sin(time + phase) * 0.008;
                        const floatY = Math.cos(time * 0.7 + phase) * 0.006;
                        
                        // Apply offset based on text position preference
                        const offsetScale = 0.001;
                        const offsetX = offset.x * offsetScale;
                        const offsetY = offset.y * offsetScale;
                        
                        child.position.copy(child.userData.basePos);
                        child.position.x += floatX + offsetX;
                        child.position.y += floatY + offsetY;
                        
                        // Scale label with zoom
                        const baseScale = 0.015;
                        const newScale = baseScale * zoomFactor;
                        child.scale.set(
                            (child.userData.originalWidth || 1) * newScale,
                            newScale,
                            1
                        );
                    } else if (child.type === 'Points' && child.material) {
                        // Scale the point dots with zoom
                        child.material.size = 0.008 * zoomFactor;
                    } else if (child.type === 'Group') {
                        // Scale the cross markers
                        child.scale.setScalar(zoomFactor);
                    }
                });
            }
            
            renderer.render(scene, camera);
        }
        
        // Start
        init();
    </script>
</body>
</html>
